<title>SAT CRM — Expired Leads</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📞</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0f172a; color: #e2e8f0; font-family: 'Instrument Sans', system-ui, sans-serif; min-height: 100vh; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #0f172a; }
::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
input, select, textarea, button { font-family: inherit; }
.mono { font-family: 'JetBrains Mono', monospace; }

/* ── AUTH SCREEN ─────────────────────────── */
.auth-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; gap:16px; }
.auth-logo { font-size:36px; font-weight:700; color:#f59e0b; letter-spacing:-1px; }
.auth-sub { font-size:14px; color:#64748b; margin-top:-8px; margin-bottom:12px; }
.auth-card { background:#1e293b; border:1px solid #334155; border-radius:12px; padding:32px; width:360px; max-width:90vw; }
.auth-card h2 { font-size:18px; font-weight:700; color:#f8fafc; margin-bottom:20px; text-align:center; }
.auth-field { margin-bottom:14px; }
.auth-field label { display:block; font-size:12px; color:#94a3b8; margin-bottom:4px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; }
.auth-field input { width:100%; background:#0f172a; border:1px solid #334155; border-radius:8px; padding:10px 14px; color:#f8fafc; font-size:14px; outline:none; transition:border-color 0.2s; }
.auth-field input:focus { border-color:#f59e0b; }
.auth-btn { width:100%; background:#f59e0b; color:#0f172a; border:none; border-radius:8px; padding:12px; font-size:15px; font-weight:700; cursor:pointer; transition:background 0.15s; margin-top:8px; }
.auth-btn:hover { background:#fbbf24; }
.auth-btn:disabled { background:#334155; color:#64748b; cursor:default; }
.auth-error { color:#ef4444; font-size:13px; margin-top:10px; text-align:center; min-height:20px; }
.auth-switch { color:#64748b; font-size:13px; text-align:center; margin-top:16px; }
.auth-switch a { color:#3b82f6; cursor:pointer; text-decoration:none; }
.auth-switch a:hover { text-decoration:underline; }
.auth-info { color:#475569; font-size:11px; text-align:center; margin-top:12px; line-height:1.5; }

/* ── SYNC ────────────────────────────────── */
.sync-dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:6px; }
.sync-status { font-size:11px; color:#64748b; display:flex; align-items:center; }

/* ── HEADER ──────────────────────────────── */
.header { background:#1e293b; border-bottom:1px solid #334155; padding:12px 20px; position:sticky; top:0; z-index:50; }
.header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.logo { font-size:22px; font-weight:700; color:#f59e0b; letter-spacing:-0.5px; }
.logo-sub { font-size:14px; color:#94a3b8; font-weight:500; margin-left:10px; }
.header-right { display:flex; align-items:center; gap:16px; }
.header-stats { display:flex; gap:20px; }
.stat-box { text-align:center; }
.stat-label { font-size:10px; color:#64748b; letter-spacing:1px; font-family:'JetBrains Mono',monospace; }
.stat-value { font-size:20px; font-weight:700; font-family:'JetBrains Mono',monospace; }
.logout-btn { background:none; border:1px solid #334155; color:#64748b; padding:4px 10px; border-radius:4px; font-size:11px; cursor:pointer; }
.logout-btn:hover { border-color:#64748b; color:#94a3b8; }
.user-email { font-size:11px; color:#475569; max-width:140px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

/* ── TABS ────────────────────────────────── */
.tabs { display:flex; gap:4px; }
.tab-btn { padding:6px 14px; border-radius:6px; font-size:13px; font-weight:600; border:none; cursor:pointer; background:transparent; color:#94a3b8; transition:all 0.15s; }
.tab-btn.active { background:#f59e0b; color:#0f172a; }
.tab-btn:hover:not(.active) { background:#334155; }

/* ── FILTERS ─────────────────────────────── */
.filters { padding:12px 20px; background:#1e293b; display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
.filter-input { background:#0f172a; border:1px solid #334155; border-radius:6px; padding:7px 12px; color:#e2e8f0; font-size:13px; outline:none; }
.filter-input:focus { border-color:#f59e0b; }
.filter-select { background:#0f172a; border:1px solid #334155; border-radius:6px; padding:7px 10px; color:#e2e8f0; font-size:13px; }
.filter-count { font-size:12px; color:#64748b; margin-left:auto; }

/* ── CONTENT ─────────────────────────────── */
.content { padding:12px 20px; }
.queue-banner { margin-bottom:12px; padding:12px; background:#1e293b; border-radius:8px; font-size:13px; color:#94a3b8; display:flex; gap:20px; flex-wrap:wrap; }
.queue-banner strong { font-family:'JetBrains Mono',monospace; }
.gv-tip { background:#0f172a; border:1px solid #334155; border-radius:6px; padding:10px 14px; font-size:12px; color:#94a3b8; margin-bottom:12px; line-height:1.5; }
.gv-tip strong { color:#f59e0b; }
.gv-link { color:#3b82f6; text-decoration:none; }
.gv-link:hover { text-decoration:underline; }

/* ── LEAD CARD ───────────────────────────── */
.lead-card { background:#1e293b; border-radius:8px; margin-bottom:6px; border:1px solid #334155; overflow:hidden; }
.lead-card.followup-due { border-color:#3b82f6; }
.lead-card.appointment { border-color:#22c55e; }
.lead-row { padding:10px 16px; cursor:pointer; display:grid; grid-template-columns:8px 1fr 130px 90px 70px 80px; gap:12px; align-items:center; font-size:13px; transition:background 0.1s; }
.lead-row:hover { background:#1a2740; }
.status-dot { width:8px; height:8px; border-radius:50%; }
.lead-name { font-weight:600; color:#f8fafc; }
.lead-addr { color:#64748b; font-size:12px; margin-top:1px; }
.lead-price { font-family:'JetBrains Mono',monospace; color:#f59e0b; }
.lead-type { font-size:12px; color:#94a3b8; }
.lead-beds { font-size:12px; color:#64748b; }
.lead-status { font-size:11px; font-weight:600; text-transform:uppercase; }

/* ── EXPANDED ────────────────────────────── */
.lead-detail { padding:0 16px 16px; border-top:1px solid #334155; display:grid; grid-template-columns:1fr 1fr; gap:20px; }
.section-label { font-size:11px; font-weight:600; color:#64748b; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; margin-top:12px; }
.detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:4px; font-size:12px; color:#94a3b8; margin-bottom:16px; }
.detail-grid strong { color:#e2e8f0; }

.phone-item { display:flex; align-items:center; gap:8px; padding:6px 10px; background:#0f172a; border-radius:6px; margin-bottom:4px; }
.phone-number { font-family:'JetBrains Mono',monospace; font-size:14px; font-weight:500; cursor:pointer; border:none; background:none; text-align:left; }
.phone-number:hover { text-decoration:underline; }
.phone-tag { font-size:10px; color:#64748b; background:#1e293b; padding:2px 6px; border-radius:4px; }
.dnc-tag { font-size:10px; color:#ef4444; font-weight:600; }
.call-btn { margin-left:auto; background:#334155; border:none; color:#f59e0b; padding:4px 10px; border-radius:4px; cursor:pointer; font-size:11px; font-weight:600; }
.call-btn:hover { background:#475569; }

.add-phone { display:flex; gap:6px; align-items:center; margin-top:4px; }
.add-phone input { background:#0f172a; border:1px solid #334155; border-radius:4px; padding:5px 8px; color:#e2e8f0; font-size:12px; width:140px; outline:none; font-family:'JetBrains Mono',monospace; }
.add-phone select { background:#0f172a; border:1px solid #334155; border-radius:4px; padding:5px 6px; color:#e2e8f0; font-size:11px; }
.add-phone button { background:#334155; border:none; color:#e2e8f0; padding:5px 10px; border-radius:4px; cursor:pointer; font-size:11px; }

.note-input { width:100%; background:#0f172a; border:1px solid #334155; border-radius:6px; padding:10px; color:#e2e8f0; font-size:12px; min-height:60px; resize:vertical; outline:none; font-family:'Instrument Sans',sans-serif; margin-bottom:8px; }
.note-input:focus { border-color:#f59e0b; }

.disp-row { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:12px; }
.disp-btn { padding:5px 10px; border-radius:6px; cursor:pointer; font-size:11px; font-weight:600; display:flex; align-items:center; gap:4px; border:1px solid; transition:all 0.1s; }
.disp-btn:hover { filter:brightness(1.3); }

.followup-row { display:flex; gap:8px; align-items:center; margin-bottom:16px; }
.followup-row label { font-size:12px; color:#64748b; }
.followup-row input[type="date"] { background:#0f172a; border:1px solid #334155; border-radius:4px; padding:4px 8px; color:#e2e8f0; font-size:12px; outline:none; }
.followup-info { font-size:11px; color:#3b82f6; }
.save-note-btn { background:#334155; border:none; color:#e2e8f0; padding:5px 12px; border-radius:4px; cursor:pointer; font-size:11px; margin-bottom:16px; }
.save-note-btn:disabled { background:#1e293b; color:#475569; cursor:default; }
.history-item { background:#0f172a; padding:6px 10px; border-radius:4px; font-size:11px; margin-bottom:3px; }
.history-header { display:flex; justify-content:space-between; }
.history-note { color:#94a3b8; margin-top:3px; }

/* ── DASHBOARD ───────────────────────────── */
.dashboard { padding:20px; }
.dash-title { font-size:18px; font-weight:700; margin-bottom:16px; color:#f8fafc; }
.dash-subtitle { font-size:15px; font-weight:600; margin:24px 0 12px; color:#f8fafc; }
.big-stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:24px; }
.big-stat { background:#1e293b; border-radius:8px; padding:16px 14px; text-align:center; }
.big-stat-val { font-size:28px; font-weight:700; font-family:'JetBrains Mono',monospace; }
.big-stat-label { font-size:11px; color:#64748b; margin-top:4px; text-transform:uppercase; letter-spacing:1px; }
.daily-table { background:#1e293b; border-radius:8px; overflow:hidden; }
.daily-header { display:grid; grid-template-columns:120px repeat(4,1fr); padding:8px 16px; background:#334155; font-size:11px; font-weight:600; color:#94a3b8; text-transform:uppercase; letter-spacing:1px; }
.daily-row { display:grid; grid-template-columns:120px repeat(4,1fr); padding:10px 16px; border-bottom:1px solid #0f172a; font-size:13px; font-family:'JetBrains Mono',monospace; }
.town-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:8px; }
.town-item { background:#1e293b; padding:8px 12px; border-radius:6px; cursor:pointer; display:flex; justify-content:space-between; font-size:13px; }
.town-item:hover { background:#334155; }
.empty-state { text-align:center; padding:60px; color:#475569; }
.export-row { display:flex; gap:8px; align-items:center; margin:20px 0; padding:12px; background:#1e293b; border-radius:8px; }
.export-btn { background:#334155; border:none; color:#e2e8f0; padding:6px 14px; border-radius:6px; cursor:pointer; font-size:12px; font-weight:600; }
.export-btn:hover { background:#475569; }

.toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#22c55e; color:#fff; padding:12px 24px; border-radius:8px; font-size:14px; font-weight:600; z-index:100; opacity:0; transition:opacity 0.3s; pointer-events:none; white-space:nowrap; box-shadow:0 4px 20px rgba(0,0,0,0.4); }
.toast.show { opacity:1; }
.loading-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; gap:16px; }
.spinner { width:32px; height:32px; border:3px solid #334155; border-top-color:#f59e0b; border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

@media (max-width:768px) {
  .lead-row { grid-template-columns:8px 1fr 80px 60px; }
  .lead-beds,.lead-type { display:none; }
  .lead-detail { grid-template-columns:1fr; }
  .header-stats { gap:12px; }
  .filters { flex-direction:column; }
  .filter-input { width:100%; }
  .auth-card { padding:24px 20px; }
}
</style>

function parseLeads(raw) {
  return raw.trim().split("\n").map(line => {
    const p = line.split("|");
    const allAfter12 = p.slice(13).join("|");
    const phoneParts = allAfter12 ? allAfter12.split("~") : [];
    const phones = phoneParts.map(ph => {
      const [n, t, d] = ph.split("|");
      return { n, t:t==="M"?"Mobile":t==="H"?"Home":t==="O"?"Owner":"Other", d:d==="1" };
    }).filter(ph => ph.n);
    return { id:p[0], addr:p[1], town:p[2], price:parseInt(p[3])||0, owner:p[4], cat:p[5], bed:p[6], bath:p[7], dom:p[8], expired:p[9], agent:p[10], agentPh:p[11], mls:p[12], phones };
  });
}
const LEADS = parseLeads(RAW);

async function dbGet(key) {
  try {
    const { data, error } = await sb.from(TABLE).select("value").eq("key", key).eq("user_id", currentUser.id).maybeSingle();
    if (error) throw error;
    return data ? JSON.parse(data.value) : null;
  } catch(e) { console.error("dbGet:", e); return null; }
}

async function dbSet(key, value) {
  try {
    const { error } = await sb.from(TABLE).upsert({
      key, user_id: currentUser.id, value: JSON.stringify(value), updated_at: new Date().toISOString()
    }, { onConflict: "key,user_id" });
    if (error) throw error;
  } catch(e) { console.error("dbSet:", e); }
}

// STORAGE — localStorage + Supabase sync
// ═══════════════════════════════════════════════════════════
let CRM = {};
let STATS = {};
let syncStatus = "syncing";
let saveTimer = null;

function localGet(k) { try { return JSON.parse(localStorage.getItem(k))||{}; } catch { return {}; } }
function localSet(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch{} }

async function loadData() {
  CRM = localGet("sat-crm-v4");
  STATS = localGet("sat-stats-v4");
  try {
    const [cloudCrm, cloudStats] = await Promise.all([dbGet("crm_state"), dbGet("daily_stats")]);
    if (cloudCrm && Object.keys(cloudCrm).length >= Object.keys(CRM).length) { CRM = cloudCrm; localSet("sat-crm-v4", CRM); }
    if (cloudStats && Object.keys(cloudStats).length >= Object.keys(STATS).length) { STATS = cloudStats; localSet("sat-stats-v4", STATS); }
    syncStatus = "synced";
  } catch(e) { console.warn("Cloud sync failed:", e); syncStatus = "offline"; }
}

function persistData() {
  localSet("sat-crm-v4", CRM);
  localSet("sat-stats-v4", STATS);
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    syncStatus = "syncing"; renderSyncStatus();
    try {
      await Promise.all([dbSet("crm_state", CRM), dbSet("daily_stats", STATS)]);
      syncStatus = "synced";
    } catch(e) { syncStatus = "offline"; }
    renderSyncStatus();
  }, 1500);
}

let gvOpened=false;
function copyAndCall(number) {
  const clean=number.replace(/\D/g,"");
  navigator.clipboard.writeText(clean).then(()=>{
    if(!gvOpened){window.open("https://voice.google.com/u/0/calls","googlevoice");gvOpened=true;showToast("📋 "+fmt(clean)+" copied! Paste in Google Voice (Ctrl+V) → call",4000);}
    else{showToast("📋 "+fmt(clean)+" copied! Switch to GV → Ctrl+V → call",3000);}
  }).catch(()=>{
    const el=document.createElement("textarea");el.value=clean;el.style.position="fixed";el.style.opacity="0";document.body.appendChild(el);el.select();document.execCommand("copy");document.body.removeChild(el);
    if(!gvOpened){window.open("https://voice.google.com/u/0/calls","googlevoice");gvOpened=true;}showToast("📋 "+fmt(clean)+" copied!",3000);
  });
}

function logCall(leadId, disposition) {
  const noteEl=document.getElementById("note-"+leadId); const followEl=document.getElementById("follow-"+leadId);
  const noteText=noteEl?noteEl.value:""; const followDate=followEl?followEl.value:"";
  const prev=getLS(leadId);
  CRM[leadId]={...prev, status:disposition, calls:[...prev.calls,{date:new Date().toISOString(),disposition,note:noteText}],
    notes:noteText?[...prev.notes,{date:new Date().toISOString(),text:noteText}]:prev.notes,
    followUp:disposition==="callback"&&followDate?followDate:prev.followUp};
  const d=today(); if(!STATS[d])STATS[d]={calls:0,connects:0,appointments:0,vms:0};
  STATS[d].calls++; if(["callback","not_interested","appointment","relisted"].includes(disposition))STATS[d].connects++;
  if(disposition==="appointment")STATS[d].appointments++; if(disposition==="left_vm")STATS[d].vms++;
  persistData(); const dd=DISPOSITIONS.find(x=>x.key===disposition); showToast(dd?dd.icon+" "+dd.label+" logged":"Logged"); render();
}

function getQueueLeads(){const d=today();const fu=LEADS.filter(l=>{const s=getLS(l.id);return s.followUp&&s.followUp<=d&&s.status==="callback";}).sort((a,b)=>(getLS(a.id).followUp||"").localeCompare(getLS(b.id).followUp||""));return[...fu,...LEADS.filter(l=>getLS(l.id).status==="new")];}
function getFollowUpLeads(){return LEADS.filter(l=>{const s=getLS(l.id);return s.followUp&&s.status==="callback";}).sort((a,b)=>(getLS(a.id).followUp||"").localeCompare(getLS(b.id).followUp||""));}
function getFilteredLeads(){let list=LEADS;if(searchText){const s=searchText.toLowerCase();list=list.filter(l=>l.owner.toLowerCase().includes(s)||l.addr.toLowerCase().includes(s)||l.town.toLowerCase().includes(s)||l.mls.includes(s));}if(townFilter!=="all")list=list.filter(l=>l.town===townFilter);if(catFilter!=="all")list=list.filter(l=>l.cat===catFilter);if(statusFilter!=="all")list=list.filter(l=>getLS(l.id).status===statusFilter);return list;}
function getOverallStats(){let c=0,a=0,cb=0,ni=0,u=0;LEADS.forEach(l=>{const s=getLS(l.id).status;if(s==="new")u++;else if(s==="appointment")a++;else if(s==="callback")cb++;else if(s==="not_interested")ni++;else c++;});return{contacted:c,appointments:a,callbacks:cb,notInterested:ni,uncontacted:u,total:LEADS.length};}

async function handleAuth() {
  const email = document.getElementById("auth-email").value;
  const password = document.getElementById("auth-password").value;
  const errEl = document.getElementById("auth-error");
  const btn = document.getElementById("auth-btn");
  if (!email || !password) { errEl.textContent = "Fill in both fields"; return; }
  if (password.length < 6) { errEl.textContent = "Password must be at least 6 characters"; return; }
  btn.disabled = true; btn.textContent = "Please wait..."; errEl.textContent = "";

  try {
    let result;
    if (authMode === "signup") {
      result = await sb.auth.signUp({ email, password });
      if (result.error) throw result.error;
      if (result.data.user && !result.data.session) {
        errEl.style.color = "#22c55e";
        errEl.textContent = "Check your email to confirm, then log in.";
        btn.disabled = false; btn.textContent = "Sign Up"; authMode = "login";
        return;
      }
    } else {
      result = await sb.auth.signInWithPassword({ email, password });
      if (result.error) throw result.error;
    }
    currentUser = result.data.user;
    document.getElementById("app").innerHTML = '<div class="loading-screen"><div class="spinner"></div><div style="color:#64748b;font-size:13px">Loading your data...</div></div>';
    await loadData();
    render();
  } catch(e) {
    errEl.style.color = "#ef4444";
    errEl.textContent = e.message || "Authentication failed";
    btn.disabled = false; btn.textContent = authMode === "signup" ? "Sign Up" : "Log In";
  }
}

async function logout() {
  await sb.auth.signOut();
  currentUser = null;
  CRM = {}; STATS = {};
  renderAuthScreen();
}

function switchAuthMode() {
  authMode = authMode === "login" ? "signup" : "login";
  renderAuthScreen();
}

// ═══════════════════════════════════════════════════════════
function render() {
  if(!currentUser) return renderAuthScreen();
  const queueLeads=getQueueLeads(), followUpLeads=getFollowUpLeads(), filteredLeads=getFilteredLeads();
  const todayStr=today(), ts=STATS[todayStr]||{calls:0,connects:0,appointments:0,vms:0}, overall=getOverallStats();
  const towns=[...new Set(LEADS.map(l=>l.town))].sort(), cats=[...new Set(LEADS.map(l=>l.cat))].sort();
  let displayLeads=currentTab==="queue"?queueLeads:currentTab==="followups"?followUpLeads:filteredLeads;

  let h=`<div class="header"><div class="header-top"><div><span class="logo">SAT</span><span class="logo-sub">EXPIRED LEADS CRM</span></div>
    <div class="header-right"><div id="sync-indicator" class="sync-status"></div>
    <div class="header-stats"><div class="stat-box"><div class="stat-label">TODAY</div><div class="stat-value" style="color:#f59e0b">${ts.calls}</div></div>
    <div class="stat-box"><div class="stat-label">CONNECTS</div><div class="stat-value" style="color:#3b82f6">${ts.connects}</div></div>
    <div class="stat-box"><div class="stat-label">APPTS</div><div class="stat-value" style="color:#22c55e">${ts.appointments}</div></div>
    <div class="stat-box"><div class="stat-label">QUEUE</div><div class="stat-value" style="color:#94a3b8">${queueLeads.length}</div></div></div>
    <div class="user-email">${escHtml(currentUser.email)}</div>
    <button class="logout-btn" onclick="logout()">Logout</button></div></div>
    <div class="tabs"><button class="tab-btn ${currentTab==="queue"?"active":""}" onclick="setTab('queue')">Call Queue (${queueLeads.length})</button>
    <button class="tab-btn ${currentTab==="followups"?"active":""}" onclick="setTab('followups')">Follow-ups (${followUpLeads.length})</button>
    <button class="tab-btn ${currentTab==="all"?"active":""}" onclick="setTab('all')">All Leads (${LEADS.length})</button>
    <button class="tab-btn ${currentTab==="dashboard"?"active":""}" onclick="setTab('dashboard')">Dashboard</button></div></div>`;

  if(currentTab==="dashboard"){
    const de=Object.entries(STATS).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,14);
    const tc={};LEADS.forEach(l=>{tc[l.town]=(tc[l.town]||0)+1;});const st=Object.entries(tc).sort((a,b)=>b[1]-a[1]).slice(0,20);
    h+=`<div class="dashboard"><h2 class="dash-title">Pipeline Overview</h2><div class="big-stats">
      <div class="big-stat"><div class="big-stat-val" style="color:#f8fafc">${overall.total}</div><div class="big-stat-label">Total</div></div>
      <div class="big-stat"><div class="big-stat-val" style="color:#94a3b8">${overall.uncontacted}</div><div class="big-stat-label">Uncontacted</div></div>
      <div class="big-stat"><div class="big-stat-val" style="color:#3b82f6">${overall.callbacks}</div><div class="big-stat-label">Callbacks</div></div>
      <div class="big-stat"><div class="big-stat-val" style="color:#22c55e">${overall.appointments}</div><div class="big-stat-label">Appointments</div></div>
      <div class="big-stat"><div class="big-stat-val" style="color:#ef4444">${overall.notInterested}</div><div class="big-stat-label">Not Interested</div></div>
      <div class="big-stat"><div class="big-stat-val" style="color:#8b5cf6">${overall.contacted}</div><div class="big-stat-label">Other</div></div></div>
      <div class="export-row"><button class="export-btn" onclick="exportData()">📦 Export Backup</button><button class="export-btn" onclick="importData()">📥 Import Backup</button><span style="font-size:11px;color:#475569;margin-left:8px">JSON backup</span></div>
      <h3 class="dash-subtitle">Daily Activity</h3><div class="daily-table"><div class="daily-header"><span>Date</span><span>Calls</span><span>Connects</span><span>VMs</span><span>Appts</span></div>
      ${de.map(([d,s])=>`<div class="daily-row"><span style="color:#94a3b8">${d}</span><span style="color:#f59e0b">${s.calls}</span><span style="color:#3b82f6">${s.connects}</span><span style="color:#8b5cf6">${s.vms}</span><span style="color:#22c55e">${s.appointments}</span></div>`).join("")}
      ${de.length===0?'<div style="padding:20px;text-align:center;color:#475569;font-size:13px">No activity yet</div>':''}</div>
      <h3 class="dash-subtitle">By Town (Top 20)</h3><div class="town-grid">${st.map(([t,c])=>`<div class="town-item" onclick="jumpToTown('${t.replace(/'/g,"\\'")}')"><span>${t}</span><span class="mono" style="color:#f59e0b">${c}</span></div>`).join("")}</div></div>`;
  }

  if(currentTab==="all"){
    h+=`<div class="filters"><input class="filter-input" style="width:240px" placeholder="Search..." value="${escHtml(searchText)}" oninput="setSearch(this.value)">
      <select class="filter-select" onchange="setTown(this.value)"><option value="all">All Towns</option>${towns.map(t=>`<option value="${escHtml(t)}" ${townFilter===t?"selected":""}>${escHtml(t)}</option>`).join("")}</select>
      <select class="filter-select" onchange="setCat(this.value)"><option value="all">All Types</option>${cats.map(c=>`<option value="${escHtml(c)}" ${catFilter===c?"selected":""}>${escHtml(c)}</option>`).join("")}</select>
      <select class="filter-select" onchange="setStatus(this.value)"><option value="all">All Statuses</option><option value="new" ${statusFilter==="new"?"selected":""}>Uncontacted</option><option value="callback" ${statusFilter==="callback"?"selected":""}>Callback</option><option value="no_answer" ${statusFilter==="no_answer"?"selected":""}>No Answer</option><option value="left_vm" ${statusFilter==="left_vm"?"selected":""}>Left VM</option><option value="appointment" ${statusFilter==="appointment"?"selected":""}>Appointment</option><option value="not_interested" ${statusFilter==="not_interested"?"selected":""}>Not Interested</option></select>
      <span class="filter-count">${filteredLeads.length} leads</span></div>`;
  }

  if(currentTab!=="dashboard"){
    h+='<div class="content">';
    if(currentTab==="queue"){
      h+=`<div class="gv-tip"><strong>Workflow:</strong> Click CALL → number copies → switch to Google Voice → Ctrl+V → call. <a class="gv-link" href="https://voice.google.com/u/0/calls" target="googlevoice">Open Google Voice ↗</a></div>`;
      h+=`<div class="queue-banner"><span>🔥 <strong style="color:#f59e0b">${queueLeads.filter(l=>getLS(l.id).status==="callback").length}</strong> follow-ups due</span><span>📋 <strong style="color:#94a3b8">${queueLeads.filter(l=>getLS(l.id).status==="new").length}</strong> uncontacted</span></div>`;
    }
    if(!displayLeads.length) h+=`<div class="empty-state">${currentTab==="queue"?"Queue clear! 🎉":currentTab==="followups"?"No follow-ups.":"No matches."}</div>`;

    displayLeads.forEach(lead=>{
      const ls=getLS(lead.id),isExp=expandedId===lead.id,allPh=[...lead.phones,...(ls.extraPhones||[])];
      const sc=STATUS_COLORS[ls.status]||"#475569",isDue=ls.followUp&&ls.followUp<=todayStr&&ls.status==="callback";
      h+=`<div class="lead-card ${isDue?"followup-due":""} ${ls.status==="appointment"?"appointment":""}">
        <div class="lead-row" onclick="toggleExpand('${lead.id}')"><div class="status-dot" style="background:${sc}"></div>
        <div><div class="lead-name">${escHtml(lead.owner)}</div><div class="lead-addr">${escHtml(lead.addr)}, ${escHtml(lead.town)}</div></div>
        <div class="lead-price mono">${fmtPrice(lead.price)}</div><div class="lead-type">${shortCat(lead.cat)}</div>
        <div class="lead-beds">${lead.bed}bd/${lead.bath}ba</div>
        <div class="lead-status" style="color:${sc}">${ls.status==="new"?"NEW":ls.status.replace(/_/g," ")}</div></div>`;

      if(isExp){
        h+=`<div class="lead-detail"><div><div class="section-label">Property</div><div class="detail-grid">
          <span>MLS: <strong>${lead.mls}</strong></span><span>DOM: <strong>${lead.dom}d</strong></span>
          <span>Expired: <strong>${lead.expired}</strong></span><span>Type: <strong>${escHtml(lead.cat)}</strong></span>
          <span>Agent: <strong>${escHtml(lead.agent)}</strong></span><span>Ph: <strong>${escHtml(lead.agentPh)}</strong></span></div>
          <div class="section-label">Phones (${allPh.length})</div>`;
        allPh.forEach(ph=>{h+=`<div class="phone-item"><button class="phone-number" style="color:${ph.d?"#ef4444":"#f59e0b"}" onclick="event.stopPropagation();copyAndCall('${ph.n}')">${fmt(ph.n)}</button><span class="phone-tag">${escHtml(ph.t)}</span>${ph.d?'<span class="dnc-tag">DNC</span>':''}<button class="call-btn" onclick="event.stopPropagation();copyAndCall('${ph.n}')">CALL</button></div>`;});
        h+=`<div class="add-phone"><input id="newphone-${lead.id}" placeholder="Add #" class="mono"><select id="newphonetype-${lead.id}"><option>Mobile</option><option>Home</option><option>Other</option></select><button onclick="event.stopPropagation();addPhoneToLead('${lead.id}')">+ Add</button></div></div>`;
        h+=`<div><div class="section-label">Log Call</div><textarea id="note-${lead.id}" class="note-input" placeholder="Notes..."></textarea>
          <div class="disp-row">${DISPOSITIONS.map(d=>`<button class="disp-btn" style="background:${d.color}22;border-color:${d.color}55;color:${d.color}" onclick="event.stopPropagation();logCall('${lead.id}','${d.key}')">${d.icon} ${d.label}</button>`).join("")}</div>
          <div class="followup-row"><label>Follow-up:</label><input type="date" id="follow-${lead.id}" value="${ls.followUp||""}" onchange="event.stopPropagation();setFollowUp('${lead.id}')">${ls.followUp?`<span class="followup-info">${ls.followUp}</span>`:""}</div>
          <button class="save-note-btn" onclick="event.stopPropagation();addNoteOnly('${lead.id}')">💭 Note Only</button>
          <div class="section-label">History (${ls.calls.length})</div><div style="max-height:160px;overflow-y:auto">
          ${!ls.calls.length?'<div style="color:#475569;font-size:12px">No calls yet</div>':""}
          ${[...ls.calls].reverse().map(c=>{const dd=DISPOSITIONS.find(x=>x.key===c.disposition);return`<div class="history-item"><div class="history-header"><span style="color:${STATUS_COLORS[c.disposition]||"#94a3b8"};font-weight:600">${dd?dd.icon:""} ${dd?dd.label:c.disposition}</span><span style="color:#475569">${new Date(c.date).toLocaleDateString()} ${new Date(c.date).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span></div>${c.note?`<div class="history-note">${escHtml(c.note)}</div>`:""}</div>`;}).join("")}
          </div>${ls.notes.length?`<div class="section-label" style="margin-top:12px">Notes</div>${ls.notes.map(n=>`<div class="history-item"><span style="color:#475569">${new Date(n.date).toLocaleDateString()}</span> <span style="color:#94a3b8">${escHtml(n.text)}</span></div>`).join("")}`:""}</div></div>`;
      }
      h+='</div>';
    });
    h+='</div>';
  }
  document.getElementById("app").innerHTML=h;
  renderSyncStatus();
}

// ═══════════════════════════════════════════════════════════
// INIT — check for existing session
// ═══════════════════════════════════════════════════════════
(async function init() {
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (session && session.user) {
      currentUser = session.user;
      await loadData();
      render();
    } else {
      renderAuthScreen();
    }
  } catch(e) {
    console.error("Init error:", e);
    renderAuthScreen();
  }
})();
</script>
</body>
</html>
